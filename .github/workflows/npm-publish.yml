name: Publish npm package

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    tags:
      - "npm-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-hermes-agent
  cancel-in-progress: false

jobs:
  publish:
    name: Publish hermes-agent to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out npm wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Sync package version from upstream Hermes Agent
        id: sync
        run: python scripts/sync_upstream_version.py >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already published
        id: npm
        shell: bash
        run: |
          if npm view "hermes-agent@${{ steps.sync.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "hermes-agent@${{ steps.sync.outputs.version }} is already published."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test package
        if: steps.npm.outputs.already_published != 'true'
        run: npm test

      - name: Verify npm package contents
        if: steps.npm.outputs.already_published != 'true'
        run: npm pack --dry-run

      - name: Publish to npm with trusted publishing
        if: steps.npm.outputs.already_published != 'true'
        run: npm publish --access public

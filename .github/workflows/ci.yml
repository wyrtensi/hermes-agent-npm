name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test npm wrapper
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out npm wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Sync package version from upstream Hermes Agent
        run: python scripts/sync_upstream_version.py

      - name: Test package
        run: npm test

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Build alias package
        run: npm run build:alias

      - name: Verify alias npm package contents
        run: npm pack --dry-run
        working-directory: dist/hermesagent

      - name: Verify npm command shims
        shell: bash
        run: |
          tmp_dir="$(mktemp -d)"
          package_tarball="$(npm pack --json | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => console.log(JSON.parse(input)[0].filename));')"
          npm install --ignore-scripts --prefix "$tmp_dir" "./$package_tarball"
          test -e "$tmp_dir/node_modules/.bin/hermes" || test -e "$tmp_dir/node_modules/.bin/hermes.cmd"
          test -e "$tmp_dir/node_modules/.bin/hermes-agent" || test -e "$tmp_dir/node_modules/.bin/hermes-agent.cmd"
          node -e "const pkg = require(process.argv[1]); if (pkg.bin.hermes !== 'bin/hermes.js' || pkg.bin['hermes-agent'] !== 'bin/hermes-agent.js') process.exit(1)" "$tmp_dir/node_modules/hermes-agent/package.json"

      - name: Verify alias npm command shims
        shell: bash
        run: |
          tmp_dir="$(mktemp -d)"
          npm install --ignore-scripts --prefix "$tmp_dir" ./dist/hermesagent
          test -e "$tmp_dir/node_modules/.bin/hermes" || test -e "$tmp_dir/node_modules/.bin/hermes.cmd"
          test -e "$tmp_dir/node_modules/.bin/hermes-agent" || test -e "$tmp_dir/node_modules/.bin/hermes-agent.cmd"
          test -e "$tmp_dir/node_modules/.bin/hermesagent" || test -e "$tmp_dir/node_modules/.bin/hermesagent.cmd"
          node -e "const pkg = require(process.argv[1]); if (pkg.bin.hermes !== 'bin/hermes.js' || pkg.bin['hermes-agent'] !== 'bin/hermes-agent.js' || pkg.bin.hermesagent !== 'bin/hermes-agent.js') process.exit(1)" "$tmp_dir/node_modules/hermesagent/package.json"
